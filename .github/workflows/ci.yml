name: Backend CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask Flask-SQLAlchemy Flask-Migrate Flask-JWT-Extended Flask-Cors python-dotenv Werkzeug pytest

      - name: Run tests
        run: |
          pytest